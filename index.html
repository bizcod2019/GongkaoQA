<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公务员面试知识问答系统</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="container">
        <!-- 开始页面 -->
        <div id="startScreen" class="screen">
            <div class="start-content">
                <h1 class="title">🎯 公务员面试知识问答</h1>
                <p class="subtitle">结构化面试题型模板 · 150+道精选题目库</p>
                <div class="info-cards">
                    <div class="info-card">
                        <div class="icon">📝</div>
                        <div class="text">
                            <h3>题型覆盖</h3>
                            <p>人际沟通、应急应变、组织管理、综合分析、自我认知</p>
                        </div>
                    </div>
                    <div class="info-card">
                        <div class="icon">💡</div>
                        <div class="text">
                            <h3>学习方式</h3>
                            <p>答题即时反馈，加深知识点记忆</p>
                        </div>
                    </div>
                    <div class="info-card">
                        <div class="icon">🏆</div>
                        <div class="text">
                            <h3>挑战自我</h3>
                            <p>记录答题进度，追踪学习成果</p>
                        </div>
                    </div>
                </div>
                
                <!-- 题目数量选择器 -->
                <div class="question-count-selector">
                    <h3 class="selector-title">选择题目数量</h3>
                    <div class="count-options">
                        <button class="count-option" data-count="10">10 题</button>
                        <button class="count-option" data-count="20">20 题</button>
                        <button class="count-option active" data-count="30">30 题</button>
                        <button class="count-option" data-count="50">50 题</button>
                        <button class="count-option" data-count="100">100 题</button>
                    </div>
                    <p class="selector-hint">将随机抽取 <span id="selectedCount">30</span> 道题目开始答题</p>
                </div>
                
                <!-- 按钮区域 -->
                <div class="start-buttons">
                    <button id="startBtn" class="btn-primary">开始答题</button>
                    <button id="continueBtn" class="btn-secondary hidden">继续答题</button>
                    <button id="wrongBankBtn" class="btn-wrong-bank">📚 错题库 (<span id="wrongBankCount">0</span>)</button>
                </div>
                
                <!-- 错题库提示 -->
                <div id="wrongBankHint" class="wrong-bank-hint hidden">
                    <p>💡 错题库中的题目会在答题时优先出现</p>
                </div>
                
                <!-- 保存状态提示 -->
                <div id="savedStateInfo" class="saved-state-info hidden">
                    <p>📋 已保存进度：第 <span id="savedProgress">1</span>/<span id="savedTotal">30</span> 题</p>
                    <p>✓ 正确：<span id="savedCorrect">0</span>  ✗ 错误：<span id="savedWrong">0</span></p>
                </div>
            </div>
        </div>

        <!-- 答题页面 -->
        <div id="quizScreen" class="screen hidden">
            <div class="quiz-header">
                <div class="progress-info">
                    <span class="question-counter">题目 <span id="currentQuestion">1</span>/20</span>
                    <div class="score-display">
                        <span class="correct-score">✓ <span id="correctCount">0</span></span>
                        <span class="wrong-score">✗ <span id="wrongCount">0</span></span>
                    </div>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <!-- 退出按钮 -->
                <div class="quiz-actions">
                    <button id="exitAndSaveBtn" class="btn-exit" title="退出并保存进度">💾 退出并保存</button>
                </div>
            </div>

            <div class="question-container">
                <h2 id="questionText" class="question-text"></h2>
                <div id="optionsContainer" class="options-container"></div>
            </div>

            <!-- 反馈弹窗 -->
            <div id="feedbackOverlay" class="feedback-overlay hidden">
                <div id="feedbackContent" class="feedback-content">
                    <div id="feedbackIcon" class="feedback-icon"></div>
                    <h3 id="feedbackTitle" class="feedback-title"></h3>
                    <p id="feedbackText" class="feedback-text"></p>
                    <button id="nextBtn" class="btn-primary">下一题</button>
                </div>
            </div>

            <!-- 庆祝动画容器 -->
            <div id="celebrationContainer" class="celebration-container hidden"></div>
        </div>

        <!-- 结果页面 -->
        <div id="resultScreen" class="screen hidden">
            <div class="result-content">
                <div id="resultIcon" class="result-icon"></div>
                <h2 id="resultTitle" class="result-title"></h2>
                <div class="score-summary">
                    <div class="score-item correct">
                        <span class="label">正确</span>
                        <span id="finalCorrect" class="value">0</span>
                    </div>
                    <div class="score-item wrong">
                        <span class="label">错误</span>
                        <span id="finalWrong" class="value">0</span>
                    </div>
                    <div class="score-item total">
                        <span class="label">正确率</span>
                        <span id="accuracy" class="value">0%</span>
                    </div>
                </div>
                <div class="result-message">
                    <p id="resultMessage"></p>
                </div>
                <div class="result-actions">
                    <button id="restartBtn" class="btn-primary">重新答题</button>
                    <button id="reviewBtn" class="btn-secondary">查看错题</button>
                </div>
            </div>
        </div>

        <!-- 错题回顾页面 -->
        <div id="reviewScreen" class="screen hidden">
            <div class="review-header">
                <button id="backToResultBtn" class="btn-back">← 返回结果</button>
                <h2>错题回顾</h2>
            </div>
            <div id="wrongQuestionsContainer" class="wrong-questions-container"></div>
        </div>

        <!-- 错题库管理页面 -->
        <div id="wrongBankScreen" class="screen hidden">
            <div class="review-header">
                <button id="backToStartBtn" class="btn-back">← 返回首页</button>
                <h2>📚 错题库管理</h2>
                <div class="wrong-bank-actions">
                    <button id="clearAllWrongBtn" class="btn-danger">清空错题库</button>
                </div>
            </div>
            <div class="wrong-bank-stats">
                <p>共 <span id="totalWrongCount">0</span> 道错题 | 错题会在答题时优先出现</p>
            </div>
            <div id="wrongBankContainer" class="wrong-questions-container"></div>
        </div>
    </div>

    <!-- 引入题目数据 -->
    <script src="questions-data.js"></script>
    
    <script>
        // ========== 常量定义 ==========
        const STORAGE_KEY = 'quiz_saved_state'; // 本地存储键名
        const WRONG_BANK_KEY = 'quiz_wrong_bank'; // 错题库存储键名

        // ========== 游戏状态 ==========
        let selectedQuestionCount = 30; // 默认30题
        let currentQuestionIndex = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let wrongQuestions = [];
        let canAnswer = true;
        let questions = []; // 当前答题使用的题目

        // ========== DOM 元素 ==========
        const startScreen = document.getElementById('startScreen');
        const quizScreen = document.getElementById('quizScreen');
        const resultScreen = document.getElementById('resultScreen');
        const reviewScreen = document.getElementById('reviewScreen');
        const wrongBankScreen = document.getElementById('wrongBankScreen');
        const startBtn = document.getElementById('startBtn');
        const continueBtn = document.getElementById('continueBtn');
        const wrongBankBtn = document.getElementById('wrongBankBtn');
        const backToStartBtn = document.getElementById('backToStartBtn');
        const clearAllWrongBtn = document.getElementById('clearAllWrongBtn');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const currentQuestionSpan = document.getElementById('currentQuestion');
        const correctCountSpan = document.getElementById('correctCount');
        const wrongCountSpan = document.getElementById('wrongCount');
        const progressFill = document.getElementById('progressFill');
        const feedbackOverlay = document.getElementById('feedbackOverlay');
        const feedbackIcon = document.getElementById('feedbackIcon');
        const feedbackTitle = document.getElementById('feedbackTitle');
        const feedbackText = document.getElementById('feedbackText');
        const nextBtn = document.getElementById('nextBtn');
        const celebrationContainer = document.getElementById('celebrationContainer');
        const exitAndSaveBtn = document.getElementById('exitAndSaveBtn');
        const savedStateInfo = document.getElementById('savedStateInfo');

        // ========== 状态保存和加载功能 ==========
        
        // 保存当前状态到localStorage
        function saveState() {
            const state = {
                questions: questions,
                currentQuestionIndex: currentQuestionIndex,
                correctCount: correctCount,
                wrongCount: wrongCount,
                wrongQuestions: wrongQuestions,
                savedAt: new Date().toISOString()
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        // 从localStorage加载状态
        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    console.error('加载保存状态失败:', e);
                    return null;
                }
            }
            return null;
        }

        // 清除保存的状态
        function clearState() {
            localStorage.removeItem(STORAGE_KEY);
        }

        // 检查是否有保存的状态并更新UI
        function checkSavedState() {
            const state = loadState();
            if (state && state.questions && state.questions.length > 0) {
                // 显示继续按钮和保存状态信息
                continueBtn.classList.remove('hidden');
                savedStateInfo.classList.remove('hidden');
                
                // 更新保存状态信息
                document.getElementById('savedProgress').textContent = state.currentQuestionIndex + 1;
                document.getElementById('savedTotal').textContent = state.questions.length;
                document.getElementById('savedCorrect').textContent = state.correctCount;
                document.getElementById('savedWrong').textContent = state.wrongCount;
                
                return true;
            } else {
                continueBtn.classList.add('hidden');
                savedStateInfo.classList.add('hidden');
                return false;
            }
        }

        // ========== 错题库功能 ==========
        
        // 获取错题库
        function getWrongBank() {
            const saved = localStorage.getItem(WRONG_BANK_KEY);
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    console.error('加载错题库失败:', e);
                    return [];
                }
            }
            return [];
        }

        // 保存错题库
        function saveWrongBank(bank) {
            localStorage.setItem(WRONG_BANK_KEY, JSON.stringify(bank));
            updateWrongBankCount();
        }

        // 添加错题到错题库（避免重复）
        function addToWrongBank(question, userAnswer) {
            const bank = getWrongBank();
            // 使用题目内容作为唯一标识检查是否已存在
            const exists = bank.some(q => q.question === question.question);
            if (!exists) {
                bank.push({
                    ...question,
                    userAnswer: userAnswer,
                    addedAt: new Date().toISOString()
                });
                saveWrongBank(bank);
            }
        }

        // 从错题库删除题目
        function removeFromWrongBank(questionText) {
            let bank = getWrongBank();
            bank = bank.filter(q => q.question !== questionText);
            saveWrongBank(bank);
        }

        // 清空错题库
        function clearWrongBank() {
            localStorage.removeItem(WRONG_BANK_KEY);
            updateWrongBankCount();
        }

        // 更新错题库数量显示
        function updateWrongBankCount() {
            const bank = getWrongBank();
            const count = bank.length;
            document.getElementById('wrongBankCount').textContent = count;
            
            // 显示或隐藏错题提示
            const hint = document.getElementById('wrongBankHint');
            if (count > 0) {
                hint.classList.remove('hidden');
            } else {
                hint.classList.add('hidden');
            }
            
            return count;
        }

        // ========== 题目数量选择器 ==========
        const countOptions = document.querySelectorAll('.count-option');
        const selectedCountSpan = document.getElementById('selectedCount');

        // 题目数量选择事件
        countOptions.forEach(option => {
            option.addEventListener('click', () => {
                countOptions.forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
                selectedQuestionCount = parseInt(option.dataset.count);
                selectedCountSpan.textContent = selectedQuestionCount;
            });
        });

        // ========== 页面初始化 ==========
        checkSavedState();
        updateWrongBankCount();

        // 随机抽取题目（错题优先策略）
        function getRandomQuestions(count) {
            const wrongBank = getWrongBank();
            const wrongQuestionTexts = new Set(wrongBank.map(q => q.question));
            
            // 分离错题和非错题
            const wrongQuestionsPool = allQuestions.filter(q => wrongQuestionTexts.has(q.question));
            const normalQuestionsPool = allQuestions.filter(q => !wrongQuestionTexts.has(q.question));
            
            // 计算错题抽取比例：错题库题目占30%-50%的比例
            const wrongRatio = Math.min(0.5, Math.max(0.3, wrongQuestionsPool.length / count));
            const wrongCount = Math.min(Math.floor(count * wrongRatio), wrongQuestionsPool.length);
            const normalCount = count - wrongCount;
            
            // 随机打乱并抽取
            const shuffledWrong = wrongQuestionsPool.sort(() => Math.random() - 0.5);
            const shuffledNormal = normalQuestionsPool.sort(() => Math.random() - 0.5);
            
            // 合并并再次打乱
            const selected = [
                ...shuffledWrong.slice(0, wrongCount),
                ...shuffledNormal.slice(0, normalCount)
            ].sort(() => Math.random() - 0.5);
            
            // 如果题目不够，从剩余题目中补充
            if (selected.length < count) {
                const usedQuestions = new Set(selected.map(q => q.question));
                const remaining = allQuestions.filter(q => !usedQuestions.has(q.question));
                const shuffledRemaining = remaining.sort(() => Math.random() - 0.5);
                selected.push(...shuffledRemaining.slice(0, count - selected.length));
            }
            
            return selected;
        }

        // 开始新游戏
        startBtn.addEventListener('click', () => {
            // 清除之前保存的状态
            clearState();
            
            questions = getRandomQuestions(selectedQuestionCount);
            currentQuestionIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            wrongQuestions = [];
            correctCountSpan.textContent = '0';
            wrongCountSpan.textContent = '0';
            
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            loadQuestion();
        });

        // 继续游戏
        continueBtn.addEventListener('click', () => {
            const state = loadState();
            if (state) {
                questions = state.questions;
                currentQuestionIndex = state.currentQuestionIndex;
                correctCount = state.correctCount;
                wrongCount = state.wrongCount;
                wrongQuestions = state.wrongQuestions || [];
                
                correctCountSpan.textContent = correctCount;
                wrongCountSpan.textContent = wrongCount;
                
                startScreen.classList.add('hidden');
                quizScreen.classList.remove('hidden');
                loadQuestion();
            }
        });

        // 退出并保存
        exitAndSaveBtn.addEventListener('click', () => {
            // 只有在已经开始答题后才保存
            if (questions.length > 0) {
                saveState();
            }
            
            // 返回开始页面
            quizScreen.classList.add('hidden');
            feedbackOverlay.classList.add('hidden');
            startScreen.classList.remove('hidden');
            
            // 更新UI显示保存状态
            checkSavedState();
        });

        // 加载题目
        function loadQuestion() {
            canAnswer = true;
            const question = questions[currentQuestionIndex];
            questionText.textContent = question.question;
            currentQuestionSpan.textContent = currentQuestionIndex + 1;
            
            // 更新进度条显示
            document.querySelector('.question-counter').innerHTML = 
                `题目 <span id="currentQuestion">${currentQuestionIndex + 1}</span>/${questions.length}`;
            
            progressFill.style.width = `${((currentQuestionIndex) / questions.length) * 100}%`;

            optionsContainer.innerHTML = '';
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = option;
                optionDiv.addEventListener('click', () => selectOption(index, optionDiv));
                optionsContainer.appendChild(optionDiv);
            });
        }

        // 选择答案
        function selectOption(index, element) {
            if (!canAnswer) return;
            canAnswer = false;

            const question = questions[currentQuestionIndex];
            const selectedAnswer = question.options[index];
            const correctAnswer = question.answer;
            const isCorrect = selectedAnswer.startsWith(correctAnswer);

            // 禁用所有选项
            const allOptions = optionsContainer.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.add('disabled'));

            // 标记正确和错误答案
            element.classList.add(isCorrect ? 'correct' : 'wrong');
            if (!isCorrect) {
                allOptions.forEach(opt => {
                    if (opt.textContent.startsWith(correctAnswer)) {
                        opt.classList.add('correct');
                    }
                });
            }

            // 更新分数
            if (isCorrect) {
                correctCount++;
                correctCountSpan.textContent = correctCount;
                showCorrectFeedback(question.explanation);
                // 答对了，从错题库中移除（如果存在）
                removeFromWrongBank(question.question);
            } else {
                wrongCount++;
                wrongCountSpan.textContent = wrongCount;
                wrongQuestions.push({
                    ...question,
                    userAnswer: selectedAnswer
                });
                // 添加到错题库
                addToWrongBank(question, selectedAnswer);
                showWrongFeedback(question, selectedAnswer);
            }
            
            // 自动保存状态
            saveState();
        }

        // 显示正确反馈
        function showCorrectFeedback(explanation) {
            feedbackIcon.innerHTML = '🎉';
            feedbackIcon.className = 'feedback-icon correct-icon';
            feedbackTitle.textContent = '回答正确！';
            feedbackText.textContent = explanation;
            feedbackOverlay.classList.remove('hidden');

            // 显示庆祝动画
            showCelebration();
        }

        // 显示错误反馈
        function showWrongFeedback(question, userAnswer) {
            feedbackIcon.innerHTML = '😢';
            feedbackIcon.className = 'feedback-icon wrong-icon';
            feedbackTitle.textContent = '回答错误';
            feedbackText.innerHTML = `
                <div class="wrong-feedback">
                    <p><strong>你的答案：</strong>${userAnswer}</p>
                    <p><strong>正确答案：</strong>${question.options.find(o => o.startsWith(question.answer))}</p>
                    <p><strong>解析：</strong>${question.explanation}</p>
                </div>
            `;
            feedbackOverlay.classList.remove('hidden');
        }

        // 庆祝动画
        function showCelebration() {
            celebrationContainer.classList.remove('hidden');
            celebrationContainer.innerHTML = '';

            // 创建彩带
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                confetti.style.backgroundColor = getRandomColor();
                celebrationContainer.appendChild(confetti);
            }

            // 创建烟花
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createFirework();
                }, i * 200);
            }

            // 3秒后清除
            setTimeout(() => {
                celebrationContainer.classList.add('hidden');
            }, 3000);
        }

        // 创建烟花
        function createFirework() {
            const firework = document.createElement('div');
            firework.className = 'firework';
            firework.style.left = Math.random() * 80 + 10 + '%';
            firework.style.top = Math.random() * 60 + 20 + '%';
            celebrationContainer.appendChild(firework);

            setTimeout(() => {
                firework.remove();
            }, 1000);
        }

        // 随机颜色
        function getRandomColor() {
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#6c5ce7', '#a29bfe', '#fd79a8', '#00b894'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // 下一题
        nextBtn.addEventListener('click', () => {
            feedbackOverlay.classList.add('hidden');
            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                loadQuestion();
                // 保存当前进度
                saveState();
            } else {
                // 答题完成，清除保存状态
                clearState();
                checkSavedState();
                showResults();
            }
        });

        // 显示结果
        function showResults() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');

            const accuracy = Math.round((correctCount / questions.length) * 100);
            document.getElementById('finalCorrect').textContent = correctCount;
            document.getElementById('finalWrong').textContent = wrongCount;
            document.getElementById('accuracy').textContent = accuracy + '%';

            const resultIcon = document.getElementById('resultIcon');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');

            if (accuracy >= 90) {
                resultIcon.innerHTML = '🏆';
                resultTitle.textContent = '优秀！';
                resultMessage.textContent = '你对面试知识掌握得非常扎实，继续保持！';
            } else if (accuracy >= 70) {
                resultIcon.innerHTML = '👍';
                resultTitle.textContent = '良好！';
                resultMessage.textContent = '你对大部分知识点已有较好理解，再接再厉！';
            } else if (accuracy >= 60) {
                resultIcon.innerHTML = '💪';
                resultTitle.textContent = '及格';
                resultMessage.textContent = '基础知识已有掌握，建议多复习错题部分。';
            } else {
                resultIcon.innerHTML = '📚';
                resultTitle.textContent = '需要努力';
                resultMessage.textContent = '建议重新学习知识点，多做练习巩固记忆。';
            }

            // 如果有错题，显示查看错题按钮
            const reviewBtn = document.getElementById('reviewBtn');
            if (wrongQuestions.length > 0) {
                reviewBtn.style.display = 'inline-block';
            } else {
                reviewBtn.style.display = 'none';
            }
        }

        // 重新开始 - 返回开始页面
        document.getElementById('restartBtn').addEventListener('click', () => {
            // 清除保存状态
            clearState();
            checkSavedState();
            
            resultScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        });

        // 查看错题
        document.getElementById('reviewBtn').addEventListener('click', () => {
            resultScreen.classList.add('hidden');
            reviewScreen.classList.remove('hidden');
            showWrongQuestions();
        });

        // 返回结果页
        document.getElementById('backToResultBtn').addEventListener('click', () => {
            reviewScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
        });

        // 显示错题
        function showWrongQuestions() {
            const container = document.getElementById('wrongQuestionsContainer');
            container.innerHTML = '';

            wrongQuestions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'wrong-question-item';
                questionDiv.innerHTML = `
                    <div class="wrong-question-header">
                        <span class="question-number">第 ${index + 1} 题</span>
                    </div>
                    <div class="wrong-question-text">${q.question}</div>
                    <div class="wrong-question-answer">
                        <p class="user-answer"><strong>你的答案：</strong>${q.userAnswer}</p>
                        <p class="correct-answer"><strong>正确答案：</strong>${q.options.find(o => o.startsWith(q.answer))}</p>
                    </div>
                    <div class="wrong-question-explanation">
                        <strong>解析：</strong>${q.explanation}
                    </div>
                `;
                container.appendChild(questionDiv);
            });
        }

        // ========== 错题库管理页面功能 ==========
        
        // 打开错题库页面
        wrongBankBtn.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            wrongBankScreen.classList.remove('hidden');
            showWrongBank();
        });

        // 返回首页
        backToStartBtn.addEventListener('click', () => {
            wrongBankScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            updateWrongBankCount();
        });

        // 清空错题库
        clearAllWrongBtn.addEventListener('click', () => {
            if (confirm('确定要清空所有错题吗？此操作不可恢复。')) {
                clearWrongBank();
                showWrongBank();
            }
        });

        // 显示错题库内容
        function showWrongBank() {
            const bank = getWrongBank();
            const container = document.getElementById('wrongBankContainer');
            const totalCount = document.getElementById('totalWrongCount');
            
            totalCount.textContent = bank.length;

            if (bank.length === 0) {
                container.innerHTML = `
                    <div class="empty-bank">
                        <p>🎉 太棒了！错题库是空的</p>
                        <p>继续加油，保持学习状态！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            bank.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'wrong-question-item wrong-bank-item';
                questionDiv.innerHTML = `
                    <div class="wrong-question-header">
                        <span class="question-number">第 ${index + 1} 题</span>
                        <button class="btn-remove" onclick="removeQuestionFromBank('${q.question.replace(/'/g, "\\'")}')">
                            ✓ 已掌握，删除
                        </button>
                    </div>
                    <div class="wrong-question-text">${q.question}</div>
                    <div class="wrong-question-answer">
                        <p class="user-answer"><strong>你的错误答案：</strong>${q.userAnswer}</p>
                        <p class="correct-answer"><strong>正确答案：</strong>${q.options.find(o => o.startsWith(q.answer))}</p>
                    </div>
                    <div class="wrong-question-explanation">
                        <strong>解析：</strong>${q.explanation}
                    </div>
                `;
                container.appendChild(questionDiv);
            });
        }

        // 删除单个错题（全局函数供onclick调用）
        window.removeQuestionFromBank = function(questionText) {
            removeFromWrongBank(questionText);
            showWrongBank();
        };
    </script>
</body>
</html>
